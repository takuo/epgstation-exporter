name: Lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          verify: false

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1

      - name: Run golangci-lint with reviewdog (pull_request)
        if: github.event_name == 'pull_request'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          golangci-lint run --config .golangci.json --out-format checkstyle ./... 2>/dev/null \
            | reviewdog -f=checkstyle \
                -name="golangci-lint" \
                -reporter=github-pr-review \
                -filter-mode=added \
                -fail-level=warning

      - name: Run golangci-lint with reviewdog (push)
        if: github.event_name == 'push'
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          golangci-lint run --config .golangci.json --out-format checkstyle ./... 2>/dev/null \
            | reviewdog -f=checkstyle \
                -name="golangci-lint" \
                -reporter=github-check \
                -filter-mode=nofilter \
                -fail-level=warning

